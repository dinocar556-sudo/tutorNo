    // Icon component helper (충돌을 방지하기 위해 span으로 격리하여 수정됨)
    const Icon = ({ name, className }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current) {
          // React의 가상 DOM과 충돌하지 않도록 내부 HTML을 수동으로 제어
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
          lucide.createIcons({ root: spanRef.current });
        }
      }, [name, className]);
      
      // display: contents를 사용하여 span 태그가 UI 레이아웃에 영향을 주지 않도록 숨김
      return <span ref={spanRef} style={{ display: 'contents' }}></span>;
    };

      const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [userAnswers, setUserAnswers] = useState([]); 

      const resultRef = useRef(null);
      const [isDownloading, setIsDownloading] = useState(false);

      const handleSelectUnit = (unit) => {
        setSelectedUnit(unit);
        setCurrentQuestionIndex(0);
        setUserAnswers([]);
        setSelectedOptionIndex(null);
        setIsSubmitted(false);
        setCurrentScreen('quiz');
      };

      const handleOptionSelect = (index) => {
        if (isSubmitted) return;
        setSelectedOptionIndex(index);
      };

      const handleSubmit = () => {
        if (selectedOptionIndex === null) return;
        setIsSubmitted(true);
        
        const currentQ = selectedUnit.questions[currentQuestionIndex];
        const isCorrect = selectedOptionIndex === currentQ.correctAnswer;
        
        setUserAnswers(prev => [...prev, {
          questionId: currentQ.id,
          concept: currentQ.concept,
          questionText: currentQ.question,
          options: currentQ.options,
          selectedOptionIdx: selectedOptionIndex,
          correctOptionIdx: currentQ.correctAnswer,
          isCorrect: isCorrect,
          feedback: currentQ.feedback[selectedOptionIndex]
        }]);
      };

      const handleNext = () => {
        if (currentQuestionIndex < selectedUnit.questions.length - 1) {
          setCurrentQuestionIndex(prev => prev + 1);
          setSelectedOptionIndex(null);
          setIsSubmitted(false);
        } else {
          setCurrentScreen('result');
        }
      };

        setCurrentScreen('home');

      };

            scale: 2, 
            backgroundColor: '#f8fafc',
            useCORS: true,
          });

          const link = document.createElement('a');
          link.download = `${selectedUnit.title}_학습리포트.png`;
          link.href = canvas.toDataURL('image/png');

        const progressPercent = ((currentQuestionIndex + 1) / selectedUnit.questions.length) * 100;

        return (
          <div className="max-w-3xl mx-auto w-full px-4 py-8">
            <div className="flex justify-between items-center mb-8">
              <button onClick={goHome} className="flex items-center text-slate-500 hover:text-indigo-600 font-medium transition-colors">
                <Icon name="home" className="w-5 h-5 mr-2" /> 단원 선택으로
              </button>
              <div className="text-indigo-600 font-extrabold bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100">
                {currentQuestionIndex + 1} / {selectedUnit.questions.length}
              </div>
            </div>

            <div className="w-full bg-slate-200 rounded-full h-3 mb-8 overflow-hidden">
              <div 
                className="bg-indigo-600 h-3 rounded-full transition-all duration-500 ease-out" 
                style={{ width: `${progressPercent}%` }}
              ></div>
            </div>

            <div className="bg-white rounded-3xl shadow-lg p-6 md:p-10 mb-6 border border-slate-100">
              <h2 className="text-2xl md:text-3xl font-bold text-slate-800 leading-tight mb-8">
                <span className="text-indigo-600 mr-3 font-black">{currentQuestionIndex + 1}.</span>{question.question}
              </h2>

              <div className="space-y-4">
                {question.options.map((opt, idx) => {
                  let btnStyle = "bg-white border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 text-slate-700";
                  let icon = null;

                  if (selectedOptionIndex === idx) {
                    btnStyle = "bg-indigo-100 border-indigo-500 text-indigo-900 shadow-md ring-2 ring-indigo-200";
                  }

                  if (isSubmitted) {
                    if (idx === question.correctAnswer) {
                      btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-900";
                      icon = <Icon name="check-circle" className="w-6 h-6 text-emerald-500" />;
                    } else if (selectedOptionIndex === idx) {
                      btnStyle = "bg-rose-50 border-rose-500 text-rose-900 opacity-80";
                      icon = <Icon name="x-circle" className="w-6 h-6 text-rose-500" />;
                    } else {
                      btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                    }
                  }

                  return (
                    <button
                      key={idx}
                      onClick={() => handleOptionSelect(idx)}
                      disabled={isSubmitted}
                      className={`w-full text-left p-4 md:p-5 rounded-2xl border-2 text-lg font-medium transition-all duration-200 flex justify-between items-center ${btnStyle}`}
                    >
                      <div className="flex items-center">
                        <span className={`w-8 h-8 flex items-center justify-center rounded-full mr-4 text-sm font-bold ${selectedOptionIndex === idx ? 'bg-indigo-500 text-white' : 'bg-slate-200 text-slate-600'} ${isSubmitted && idx === question.correctAnswer ? 'bg-emerald-500 text-white' : ''}`}>
                          {idx + 1}
                        </span>
                        {opt}
                      </div>
                      {icon}
                    </button>
                  );
                })}
              </div>
            </div>

            {isSubmitted && (
              <div className={`p-6 md:p-8 rounded-3xl mb-6 shadow-sm border-2 animate-fade-in-up flex gap-4 md:gap-6 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                <div className="hidden sm:flex shrink-0">
                  <div className={`w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-inner ${isCorrect ? 'bg-emerald-100' : 'bg-rose-100'}`}>
                    {isCorrect ? '😎' : '🤔'}
                  </div>
                </div>
                <div>
                  <h3 className={`text-xl font-bold mb-2 flex items-center ${isCorrect ? 'text-emerald-800' : 'text-rose-800'}`}>
                    {isCorrect ? '완벽해! 정답이야 🎉' : '아깝다! 같이 한 번 알아볼까?'}
                  </h3>
                  <p className="text-lg text-slate-700 leading-relaxed font-medium">
                    {question.feedback[selectedOptionIndex]}
                  </p>
                </div>
              </div>
            )}

            <div className="flex justify-end">
              {!isSubmitted ? (
                <button
                  onClick={handleSubmit}
                  disabled={selectedOptionIndex === null}
                  className={`w-full md:w-auto px-10 py-4 rounded-2xl text-xl font-bold shadow-lg transition-all duration-200 flex items-center justify-center ${
                    selectedOptionIndex !== null 
                      ? 'bg-indigo-600 hover:bg-indigo-700 text-white transform hover:-translate-y-1' 
                      : 'bg-slate-300 text-slate-500 cursor-not-allowed'
                  }`}
                >
                  정답 확인하기
                </button>
              ) : (
                <button
                  onClick={handleNext}
                  className="w-full md:w-auto px-10 py-4 rounded-2xl text-xl font-bold bg-slate-800 hover:bg-slate-900 text-white shadow-lg transition-all duration-200 flex items-center justify-center transform hover:-translate-y-1"
                >
                  {currentQuestionIndex < selectedUnit.questions.length - 1 ? '다음 문제 풀기' : '결과 및 해설 보기'}
                  <Icon name="arrow-right" className="w-6 h-6 ml-2" />
                </button>
              )}
            </div>
          </div>
        );
      };

      // 3. 누적 해설 및 개별 피드백 화면
      const renderResult = () => {
        // 맞춘 문제 계산
        const correctAnswers = userAnswers.filter(a => a.isCorrect).length;
        const totalQuestions = selectedUnit.questions.length;
        const score = Math.round((correctAnswers / totalQuestions) * 100);

        // 강점과 약점 분석 로직
        const strengths = [];
        const weaknesses = [];

        userAnswers.forEach(ans => {
          if (ans.isCorrect) {
            strengths.push(ans.concept);
          } else {
            weaknesses.push(ans.concept);
          }
        });

        let message = "";
        if (score === 100) message = "완벽해요! 해당 소단원을 마스터했습니다! 🚀";
        else if (score >= 70) message = "아주 잘했어요! 틀린 문제를 통해 완벽하게 복습해 보세요. 👏";
        else message = "괜찮아요! 아래 선생님의 해설을 보며 어떤 부분을 헷갈렸는지 다시 점검해봐요! 🌱";

        return (
          <div className="max-w-4xl mx-auto w-full px-4 py-12 flex flex-col items-center">
            {/* 이미지 캡처 영역 시작 */}
            <div ref={resultRef} className="w-full bg-slate-50 p-2 sm:p-6 rounded-3xl">
              
              {/* 상단 점수 요약 */}
              <div className="bg-white w-full rounded-3xl shadow-sm p-8 text-center border border-slate-200 mb-8">
                <Icon name="award" className={`w-20 h-20 mx-auto mb-4 ${score === 100 ? 'text-yellow-400' : 'text-indigo-400'}`} />
                <h2 className="text-3xl font-extrabold text-slate-800 mb-2">
                  학습 완료! ({selectedUnit.title})
                </h2>
                <p className="text-lg text-slate-600 mb-8">{message}</p>
                
                <div className="flex justify-center items-center gap-12 bg-slate-50 rounded-2xl p-6">
                  <div className="text-center">
                    <p className="text-slate-500 font-bold mb-1">내 점수</p>
                    <p className={`text-5xl font-black ${score === 100 ? 'text-emerald-500' : 'text-indigo-600'}`}>
                      {score}<span className="text-2xl text-slate-400 ml-1">점</span>
                    </p>
                  </div>
                  <div className="h-16 w-px bg-slate-200"></div>
                  <div className="text-center">
                    <p className="text-slate-500 font-bold mb-1">맞힌 문제</p>
                    <p className="text-4xl font-bold text-slate-700">
                      {correctAnswers} <span className="text-2xl text-slate-400">/ {totalQuestions}</span>
                    </p>
                  </div>
                </div>
              </div>

              {/* [새로 추가된 기능] 학습 분석 리포트 (강점과 약점) */}
              <div className="w-full bg-white rounded-3xl shadow-sm border-2 border-indigo-100 p-6 md:p-8 mb-8">
                <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                  <Icon name="bar-chart-2" className="w-6 h-6 mr-2 text-indigo-600" /> 
                  재혁쌤의 맞춤형 학습 분석 리포트
                </h3>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* 강점 */}
                  <div className="bg-emerald-50/50 rounded-2xl p-6 border border-emerald-100">
                    <h4 className="font-bold text-emerald-800 flex items-center mb-4">
                      <Icon name="trending-up" className="w-5 h-5 mr-2" /> 훌륭해요! 나의 강점
                    </h4>
                    {strengths.length > 0 ? (
                      <ul className="list-disc list-inside space-y-2 text-emerald-700 font-medium">
                        {strengths.map((concept, idx) => <li key={`str-${idx}`}>{concept}</li>)}
                      </ul>
                    ) : (
                      <p className="text-emerald-600/70 text-sm">아직은 없지만, 아래 해설을 읽고 나면 모두 강점이 될 거예요!</p>
                    )}
                  </div>

                  {/* 약점 */}
                  <div className="bg-rose-50/50 rounded-2xl p-6 border border-rose-100">
                    <h4 className="font-bold text-rose-800 flex items-center mb-4">
                      <Icon name="target" className="w-5 h-5 mr-2" /> 집중 공략! 나의 약점
                    </h4>
                    {weaknesses.length > 0 ? (
                      <ul className="list-disc list-inside space-y-2 text-rose-700 font-medium">
                        {weaknesses.map((concept, idx) => <li key={`weak-${idx}`}>{concept}</li>)}
                      </ul>
                    ) : (
                      <p className="text-rose-600/70 text-sm">약점이 없네요! 모든 개념을 완벽하게 이해했습니다.</p>
                    )}
                  </div>
                </div>
                
                {/* 재혁쌤의 총평 */}
                <div className="mt-6 p-5 bg-indigo-50 rounded-xl border border-indigo-100 flex items-start">
                  <Icon name="message-circle" className="w-5 h-5 text-indigo-600 mr-3 shrink-0 mt-0.5" />
                  <p className="text-indigo-900 font-medium leading-relaxed">
                    {weaknesses.length === 0 
                      ? "모든 개념을 완벽하게 마스터했어요! 정말 대단합니다. 바로 다음 소단원으로 넘어가도 좋습니다." 
                      : `분석 결과, 특히 [ ${weaknesses.join(', ')} ] 개념을 헷갈려 하는 것 같네요. 약점 개념을 보완하기 위해 아래의 문항별 해설과 선생님 피드백을 꼼꼼히 읽어보고, 교과서의 해당 부분을 다시 한번 복습해 보는 것을 추천해요!`}
                  </p>
                </div>
              </div>

              {/* 누적 해설 및 개별 피드백 목록 */}
              <div className="w-full mb-6">
                <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                  <Icon name="book-open" className="w-6 h-6 mr-2 text-indigo-600" /> 
                  문항별 누적 해설 및 선생님 피드백
                </h3>
                
                <div className="space-y-6">
                  {userAnswers.map((ans, idx) => (
                    <div key={idx} className={`bg-white rounded-3xl p-6 md:p-8 shadow-sm border-2 ${ans.isCorrect ? 'border-emerald-100' : 'border-rose-100'}`}>
                      <div className="flex items-start justify-between mb-4">
                        <div className={`px-3 py-1 rounded-md text-sm font-bold ${ans.isCorrect ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                          {idx + 1}번 문항: {ans.concept}
                        </div>
                        {ans.isCorrect ? (
                          <span className="flex items-center text-emerald-600 font-bold"><Icon name="check-circle" className="w-5 h-5 mr-1"/> 맞았습니다</span>
                        ) : (
                          <span className="flex items-center text-rose-600 font-bold"><Icon name="x-circle" className="w-5 h-5 mr-1"/> 틀렸습니다</span>
                        )}
                      </div>
                      
                      <h4 className="text-xl font-bold text-slate-800 mb-6">{ans.questionText}</h4>
                      
                      <div className="bg-slate-50 rounded-2xl p-4 md:p-5 mb-6 space-y-3 border border-slate-100">
                        <div className="flex items-start">
                          <span className="text-slate-500 font-semibold w-24 shrink-0">나의 선택:</span>
                          <span className={`font-bold ${ans.isCorrect ? 'text-emerald-600' : 'text-rose-600'} line-through decoration-rose-400 decoration-2`}>
                            {ans.options[ans.selectedOptionIdx]}
                          </span>
                          {!ans.isCorrect && <span className="text-rose-600 font-bold ml-1 border-b-0 border-transparent hover:border-transparent cursor-default"></span>}
                        </div>
                        
                        {!ans.isCorrect && (
                          <div className="flex items-start">
                            <span className="text-slate-500 font-semibold w-24 shrink-0">올바른 정답:</span>
                            <span className="font-bold text-emerald-600 flex items-center">
                              {ans.options[ans.correctOptionIdx]}
                              <Icon name="check-circle" className="w-4 h-4 ml-1 inline" />
                            </span>
                          </div>
                        )}
                      </div>

                      <div className={`rounded-2xl p-5 ${ans.isCorrect ? 'bg-emerald-50' : 'bg-rose-50'}`}>
                        <h5 className={`font-bold mb-2 flex items-center ${ans.isCorrect ? 'text-emerald-800' : 'text-rose-800'}`}>
                          <Icon name="zap" className="w-4 h-4 mr-1" /> 선생님의 맞춤 피드백
                        </h5>
                        <p className="text-slate-700 leading-relaxed font-medium">
                          {ans.feedback}
                        </p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            {/* 이미지 캡처 영역 끝 */}

            {/* 하단 버튼 */}
            <div className="flex flex-col sm:flex-row justify-center gap-4 w-full mt-4">
              <button
                onClick={handleDownloadImage}
                disabled={isDownloading}
                className="w-full sm:w-auto px-8 py-4 rounded-xl text-lg font-bold bg-emerald-600 hover:bg-emerald-700 text-white shadow-lg transition-colors flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
              >
                <Icon name="download" className="w-5 h-5 mr-2" /> 
                {isDownloading ? '이미지 생성 중...' : '학습 리포트 이미지로 저장'}
              </button>
              <button
                onClick={() => handleSelectUnit(selectedUnit)}
                className="w-full sm:w-auto px-8 py-4 rounded-xl text-lg font-bold bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-700 transition-colors flex items-center justify-center"
              >
                <Icon name="refresh-cw" className="w-5 h-5 mr-2" /> 이 단원 다시 풀기
              </button>
              <button
                onClick={goHome}
                className="w-full sm:w-auto px-8 py-4 rounded-xl text-lg font-bold bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg transition-colors flex items-center justify-center"
              >
                <Icon name="home" className="w-5 h-5 mr-2" /> 다른 단원 학습하기
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans selection:bg-indigo-200 selection:text-indigo-900">
          <nav className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center">
              <button onClick={goHome} className="flex items-center text-xl font-black text-indigo-600 tracking-tighter">
                <Icon name="zap" className="w-6 h-6 mr-1" />
                친절한 재혁쌤 🧑‍🏫
              </button>
            </div>
          </nav>

          <main className="pb-20">
            {currentScreen === 'home' && renderHome()}
            {currentScreen === 'quiz' && renderQuiz()}
            {currentScreen === 'result' && renderResult()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AITutorApp />);
  </script>
</body>
</html>
